name: Update KRX Data

# 매일 평일 두 번 자동 실행 (GitHub Actions 스케줄은 UTC 기준)
# - UTC 06:45 = KST 15:45 : 정규장 마감 직후 주가 잠정치 수집
# - UTC 09:30 = KST 18:30 : 시간외 거래 마감 후 최종 확정치 수집
# ※ GitHub Actions cron은 서버 부하에 따라 수 분~수십 분 지연될 수 있습니다.
on:
  schedule:
    - cron: '45 6 * * 1-5'   # KST 15:45 - 주가 잠정치
    - cron: '30 9 * * 1-5'   # KST 18:30 - 최종 확정치
  workflow_dispatch: {}       # Actions 탭에서 수동으로도 실행 가능

permissions:
  contents: write   # krx_data.js를 저장소에 자동 커밋하기 위한 권한

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pykrx 설치
        run: pip install pykrx

      - name: KRX 데이터 수집 (krx_data.js 생성)
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python fetch_krx_data.py

      - name: krx_data.js 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add krx_data.js
          git diff --staged --quiet || git commit -m "Update KRX data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
